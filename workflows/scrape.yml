name: Price Scraper

on:
  schedule:
    - cron: '0 * * * *'   # toda hora
  workflow_dispatch:        # rodar manual pelo GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit data
        run: |
          git config user.name  "price-bot"
          git config user.email "bot@sellersflow.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "data: update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
